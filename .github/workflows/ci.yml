name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CI: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Pack
        run: dotnet pack src/Milkyway.Payments.Sdk -c Release --no-build -o ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

  publish:
    # Publishes to NuGet.org via Trusted Publishing (OIDC) when a v* tag is pushed.
    # No long-lived API key: NuGet/login exchanges a short-lived GitHub OIDC token
    # for a 1-hour temporary key. Configure a Trusted Publishing policy on nuget.org
    # for owner=bankplanet9, repo=milkyway-csharp-sdk, workflow file=ci.yml.
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mint the GitHub OIDC token for the nuget.org exchange
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Pack
        run: dotnet pack src/Milkyway.Payments.Sdk -c Release -o ./artifacts

      # Mint the temporary key right before the push (it is valid for ~1 hour).
      - name: NuGet login (OIDC → temporary API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), NOT email

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
